name: Deploy to GitHub Pages

# Auto-deploy MECE Studio to GitHub Pages on every push to `main`. The build
# job emits the SPA into `dist/`, uploads it as a Pages artifact, and the
# deploy job ships it to the Pages environment. The custom domain
# (mece-studio.struktureretsundfornuft.dk) is bound via `public/CNAME`, which
# Vite copies into `dist/` at build time. `workflow_dispatch` allows manual
# re-deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # The Rebuild-book and Stats workflows commit their regenerated artifacts
  # (PDF/EPUB, stats.json) back to `main` using GITHUB_TOKEN, and GitHub does
  # NOT raise a `push` event for GITHUB_TOKEN pushes — so without this, those
  # refreshed artifacts never reach the live site until the next human push.
  # Re-run Deploy when those workflows finish so prod catches up.
  workflow_run:
    workflows: ['Rebuild book', 'Stats']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows one active deployment at a time. A fast follow-up push waits
# rather than aborting the in-flight deploy.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build dist
    # On a workflow_run trigger, only deploy if the rebuild/stats run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Always build main's tip. A workflow_run trigger hands us the
        # *triggering* commit, which predates the bot's artifact commit, so pin
        # the ref to main to publish the freshest artifacts.
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
