name: Deploy to GitHub Pages

# Auto-deploy MECE Studio to GitHub Pages on every push to `main`. The build
# job emits the SPA into `dist/`, uploads it as a Pages artifact, and the
# deploy job ships it to the Pages environment. The custom domain
# (mece-studio.struktureretsundfornuft.dk) is bound via `public/CNAME`, which
# Vite copies into `dist/` at build time. `workflow_dispatch` allows manual
# re-deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows one active deployment at a time. A fast follow-up push waits
# rather than aborting the in-flight deploy.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
